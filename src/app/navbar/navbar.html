<nav class="navbar">
  <div class="navbar-container">
    <div class="logo-area">
      <img src="LG_monogram_badge_centered.png" alt="Logo" class="logo" />
    </div>
    <div class="search-area">
      <p-autocomplete
        [(ngModel)]="searchValue"
        [suggestions]="fiteredSuggestions"
        (completeMethod)="completeSearch($event)"
        placeholder="Search here to go to a page"
        optionLabel="name"
        class="custom-autocomplete"
        optionValue="route"
        [forceSelection]="true"
        (onSelect)="selectItem($event)"
      />
      <p-button 
      variant="text"
        icon="pi pi-search"
        severity="secondary"
        class="search-icon" 
        ariaLabel="Search"
      ></p-button>
    </div>
    <div class="links-area">
      @for (item of items; track $index) {
        <div class="nav-item" [routerLink]="item.route">{{ item.name }}</div>
      }
    </div>
  </div>
</nav>
